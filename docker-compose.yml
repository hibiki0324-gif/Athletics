name: athletics

services:
  web:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: athletics-web
    volumes:
      - .:/var/www/html
    ports:
      - "8080:80"
    environment:
      - DB_HOST=db
      - DB_DATABASE=athletics
      - DB_USERNAME=athletics_user
      - DB_PASSWORD=secret
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: athletics-db
    environment:
      MYSQL_DATABASE: athletics
      MYSQL_USER: athletics_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root_secret
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: athletics-phpmyadmin
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root_secret
    ports:
      - "8081:80"
    depends_on:
      - db

volumes:
  db_data:
